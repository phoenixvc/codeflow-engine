severity_levels:
  - name: critical
    description: >
      Affects security, data integrity or causes system failure. Must be
      addressed before merge or release. Blocks CI until resolved.
  - name: high
    description: >
      Major issue impacting user experience, performance or compliance. Should
      be prioritised immediately after all critical items have been fixed.
  - name: medium
    description: >
      Noticeable issue with moderate impact. Schedule for resolution based
      on capacity and project priorities.
  - name: low
    description: >
      Minor issue with minimal impact. Address opportunistically or as part
      of refactoring.

quality_gates:
  default:
    # Commits must contain at least one audit ID (e.g. BUG-01).
    require_audit_id: true
    # List of severity levels that block merging or release until resolved.
    block_merge_on:
      - critical
    # Whether strict mode is enforced by default.
    enforce_strict_mode: false