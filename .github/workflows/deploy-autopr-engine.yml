name: Build and Deploy CodeFlow Engine

on:
  push:
    branches:
      - master
    paths:
      - "engine/**"
      - ".github/workflows/deploy-autopr-engine.yml"
      - ".github/app-manifest.yml"
      - ".azure/pipeline-setup.md"
      - "scripts/setup-azure-auth-for-pipeline.ps1"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/deploy-autopr-engine.yml"
      - ".github/app-manifest.yml"
      - ".codeflow.yml"
      - ".azure/pipeline-setup.md"
      - "scripts/setup-azure-auth-for-pipeline.ps1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # PR validation - build and validate only, no push/deploy
  validate_pr:
    name: Validate Build (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate app-manifest.yml
        run: |
          echo "Validating GitHub App manifest..."
          python3 -c "import yaml; yaml.safe_load(open('.github/app-manifest.yml'))"
          echo "[OK] app-manifest.yml is valid YAML"

      - name: Validate .codeflow.yml config
        run: |
          if [ -f ".codeflow.yml" ]; then
            echo "Validating .codeflow.yml..."
            python3 -c "import yaml; yaml.safe_load(open('.codeflow.yml'))"
            echo "[OK] .codeflow.yml is valid YAML"
          else
            echo "[!] .codeflow.yml not found (optional)"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: false
          tags: codeflow-engine:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUN_TESTS=false

      - name: Validate build
        run: echo "[OK] Docker image built successfully for PR validation"

  build-and-push:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUN_TESTS=false

  deploy-runtime:
    name: Deploy Container Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update existing Container App
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          missing=0
          for name in RESOURCE_GROUP CONTAINER_APP IMAGE; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required deployment value: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure the production environment variables documented in .azure/pipeline-setup.md."
            exit 1
          fi

          if ! az containerapp show -n "$CONTAINER_APP" -g "$RESOURCE_GROUP" >/dev/null; then
            echo "::error::Cannot verify Container App $CONTAINER_APP in $RESOURCE_GROUP."
            echo "::error::Confirm the app exists and the pipeline identity has access before deploying this image."
            exit 1
          fi

          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"

          echo "[OK] Updated $CONTAINER_APP to $IMAGE"
